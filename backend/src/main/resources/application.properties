spring.application.name=classroomhub

# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ─── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ─── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
# 15 minutes in ms
app.jwt.access-token-expiry=900000
# 30 days in ms
app.jwt.refresh-token-expiry=2592000000

# ─── Cookie ─────────────────────────────────────────────────────────────────────
# Set COOKIE_SECURE=true in production (requires HTTPS)
app.cookie.secure=${COOKIE_SECURE:false}
# Allowed origins for CORS (comma-separated). Override in production.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.classroomhub=INFO
logging.level.org.springframework.security=WARN

# ─── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics,loggers
management.endpoint.health.show-details=when_authorized
management.endpoint.loggers.enabled=true
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# ─── OpenAPI / Swagger ─────────────────────────────────────────────────────────
# Set SWAGGER_ENABLED=false in production to hide API docs
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false

# ─── Upload ────────────────────────────────────────────────────────────────────
app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ─── Mail (SMTP) ───────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
# Port 587 → STARTTLS (Gmail, SES 587). Port 465 → SSL — set MAIL_SSL=true + MAIL_STARTTLS=false
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}

# ─── Payment gateways (Vietnamese) ──────────────────────────────────────
# App base URL (used for return / IPN URLs back to the SPA + this server).
classroomhub.app.base-url=${APP_BASE_URL:http://localhost:5173}

# VNPay sandbox: register at https://sandbox.vnpayment.vn/
classroomhub.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
classroomhub.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
classroomhub.payment.vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}

# MoMo sandbox: register at https://developers.momo.vn/
classroomhub.payment.momo.partner-code=${MOMO_PARTNER_CODE:}
classroomhub.payment.momo.access-key=${MOMO_ACCESS_KEY:}
classroomhub.payment.momo.secret-key=${MOMO_SECRET_KEY:}
classroomhub.payment.momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}

# ─── Academic period defaults ────────────────────────────────────────────
# Used by attendance auto-session generator when looking up the timetable.
classroomhub.academic.year=${ACADEMIC_YEAR:2024-2025}
classroomhub.academic.semester=${ACADEMIC_SEMESTER:1}
