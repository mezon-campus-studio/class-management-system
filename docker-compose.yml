services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────
  # Chạy mặc định: docker compose up -d
  postgres:
    image: postgres:16-alpine
    container_name: classroomhub-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-classroomhub}
      POSTGRES_USER: ${POSTGRES_USER:-classroomhub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-classroomhub_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-classroomhub_user} -d ${POSTGRES_DB:-classroomhub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Prometheus ──────────────────────────────────────────────────────
  # Chỉ chạy khi: docker compose --profile monitoring up -d
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v3.4.0
    container_name: classroomhub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ─── Loki ────────────────────────────────────────────────────────────
  loki:
    profiles: [monitoring]
    image: grafana/loki:3.4.3
    container_name: classroomhub-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ─── Promtail ────────────────────────────────────────────────────────
  promtail:
    profiles: [monitoring]
    image: grafana/promtail:3.4.3
    container_name: classroomhub-promtail
    volumes:
      - ./docker/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./backend/logs:/logs:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  # ─── Grafana ─────────────────────────────────────────────────────────
  grafana:
    profiles: [monitoring]
    image: grafana/grafana:12.0.0
    container_name: classroomhub-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data:
